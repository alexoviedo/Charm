name: ESP-IDF Firmware Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-firmware:
    name: ci / build-firmware (esp32s3)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build with ESP-IDF
        id: build
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: latest
          target: esp32s3
          command: idf.py build

      - name: Generate Workflow Summary
        if: always()
        run: |
          echo "## ESP-IDF Firmware Build Summary" >> $GITHUB_STEP_SUMMARY
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ **Build completed successfully.**" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Build failed.**" >> $GITHUB_STEP_SUMMARY
          fi
          echo "- **Target:** esp32s3" >> $GITHUB_STEP_SUMMARY
          echo "- **IDF Version:** latest" >> $GITHUB_STEP_SUMMARY
          echo "- **Job Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: firmware-esp32s3-build-artifacts
          path: |
            build/*.bin
            build/*.elf
            build/*.map
            build/bootloader/*.bin
            build/partition_table/*.bin
          if-no-files-found: ignore
