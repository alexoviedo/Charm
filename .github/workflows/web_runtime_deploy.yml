name: Runtime Web Deploy

on:
  push:
    branches:
      - main
    paths:
      - "web/**"
      - ".github/workflows/web_runtime_deploy.yml"
      - "scripts/package_web_runtime.sh"
      - "scripts/generate_release_integrity.sh"
  workflow_dispatch:
    inputs:
      target_environment:
        description: "Deployment environment"
        required: true
        default: "production"
        type: choice
        options:
          - staging
          - production
      release_id:
        description: "Optional release id override (defaults to commit SHA)"
        required: false
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: web-runtime-${{ github.ref }}
  cancel-in-progress: false

jobs:
  package-web-runtime:
    name: ci / package-web-runtime
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.meta.outputs.release_id }}
      deploy_environment: ${{ steps.meta.outputs.deploy_environment }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve release metadata
        id: meta
        run: |
          RELEASE_ID="${{ github.event.inputs.release_id }}"
          if [ -z "${RELEASE_ID}" ]; then
            RELEASE_ID="${GITHUB_SHA}"
          fi
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            DEPLOY_ENV="${{ github.event.inputs.target_environment }}"
          else
            DEPLOY_ENV="production"
          fi
          echo "release_id=${RELEASE_ID}" >> "$GITHUB_OUTPUT"
          echo "deploy_environment=${DEPLOY_ENV}" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install web QA dependencies
        run: npm --prefix web ci

      - name: Install Playwright Chromium browser
        run: npx --prefix web playwright install --with-deps chromium

      - name: Run runtime web smoke checks
        run: npm --prefix web run qa:smoke

      - name: Package runtime web site
        run: |
          scripts/package_web_runtime.sh web_dist "${{ steps.meta.outputs.release_id }}"

      - name: Generate runtime web integrity and provenance
        run: |
          scripts/generate_release_integrity.sh web_dist runtime-web-site

      - name: Upload packaged runtime web artifact
        uses: actions/upload-artifact@v4
        with:
          name: runtime-web-site
          path: web_dist/
          if-no-files-found: error

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

  deploy-web-runtime:
    name: cd / deploy-web-runtime
    needs: package-web-runtime
    runs-on: ubuntu-latest
    environment:
      name: ${{ needs.package-web-runtime.outputs.deploy_environment }}
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download packaged runtime web artifact
        uses: actions/download-artifact@v4
        with:
          name: runtime-web-site
          path: web_dist

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web_dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Deployment summary
        run: |
          echo "## Runtime Web Deploy Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "- Release ID: \`${{ needs.package-web-runtime.outputs.release_id }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Environment: \`${{ needs.package-web-runtime.outputs.deploy_environment }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Page URL: ${{ steps.deployment.outputs.page_url }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Firmware build pipeline remains separate in \`firmware_build.yml\`." >> "$GITHUB_STEP_SUMMARY"
          echo "- SHA256: \`web_dist/SHA256SUMS\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Provenance: \`web_dist/provenance.json\`" >> "$GITHUB_STEP_SUMMARY"
